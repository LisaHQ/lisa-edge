services:
  homeassistant:
    image: ${HOME_ASSISTANT_IMAGE:-ghcr.io/home-assistant/home-assistant:stable}
    container_name: lisa-ha
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${DATA_ROOT:-/srv/lisa-edge}/docker/volumes/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
