# Automatically boot the default entry after a short delay.
# Press any key during the countdown to display the GRUB menu.
set default=0
set timeout_style=countdown
set timeout=5

loadfont unicode

set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

menuentry "Install LISA Edge" {
    # Keep the current display mode for a smoother boot experience.
    set gfxpayload=keep

    # Start Ubuntu Server in unattended installation mode.
    # Cloud-init reads the NoCloud configuration from:
    #   /cdrom/autoinstall/
	linux /casper/vmlinuz autoinstall 'ds=nocloud;s=/cdrom/autoinstall/' ---

	# Load the Ubuntu installer initial RAM disk.
    initrd /casper/initrd
}
if [ "$grub_platform" = "efi" ]; then
menuentry 'Boot from next volume' {
    exit 1
}
menuentry 'UEFI Firmware Settings' {
    fwsetup
}
fi
